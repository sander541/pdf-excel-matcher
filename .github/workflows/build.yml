name: Build App

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]

jobs:
  changes:
    name: Detect relevant changes
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || !github.event.pull_request.draft
    permissions:
      pull-requests: read
      contents: read
    outputs:
      app: ${{ steps.filter.outputs.app }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Filter paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            app:
              - 'pdf_excel_annotator/**'
              - 'gui.py'
              - 'main.py'
              - 'pyproject.toml'
              - 'requirements.txt'
              - 'pdf-excel-annotator.spec'
              - 'resource/**'
              - '.github/workflows/build.yml'

  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: changes
    if: needs.changes.outputs.app == 'true' || github.event_name == 'workflow_dispatch'
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest]
        python-version: ["3.11"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Upgrade pip
        run: python -m pip install --upgrade pip wheel setuptools

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Show environment
        run: |
          python --version
          pip --version
          python -c "import PySide6, fitz, openpyxl; print('PySide6', PySide6.__version__); print('PyMuPDF', fitz.__doc__.split()[1]); print('openpyxl', openpyxl.__version__)"

      - name: Build with PyInstaller
        run: pyinstaller pdf-excel-annotator.spec

      - name: Package artifact (Windows)
        shell: pwsh
        run: |
          Compress-Archive -Path "dist/pdf-excel-annotator/*" -DestinationPath "pdf-excel-annotator-windows.zip"

      - name: Upload artifact (Windows)
        uses: actions/upload-artifact@v4
        with:
          name: pdf-excel-annotator-windows
          path: pdf-excel-annotator-windows.zip
          if-no-files-found: error
