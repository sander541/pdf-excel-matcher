name: Build App

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Upgrade pip
        run: python -m pip install --upgrade pip wheel setuptools

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Show environment
        run: |
          python --version
          pip --version
          python -c "import PySide6, fitz, openpyxl; print('PySide6', PySide6.__version__); print('PyMuPDF', fitz.__doc__.split()[1]); print('openpyxl', openpyxl.__version__)"

      - name: Build with PyInstaller
        run: pyinstaller pdf-excel-annotator.spec

      - name: Package artifact (Linux)
        if: runner.os == 'Linux'
        run: |
          tar -czf pdf-excel-annotator-linux.tar.gz -C dist pdf-excel-annotator

      - name: Package artifact (macOS)
        if: runner.os == 'macOS'
        run: |
          ditto -c -k --sequesterRsrc --keepParent dist/pdf-excel-annotator.app pdf-excel-annotator-macos.zip

      - name: Package artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path "dist/pdf-excel-annotator/*" -DestinationPath "pdf-excel-annotator-windows.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pdf-excel-annotator-${{ runner.os }}
          path: |
            pdf-excel-annotator-linux.tar.gz
            pdf-excel-annotator-macos.zip
            pdf-excel-annotator-windows.zip
          if-no-files-found: error

