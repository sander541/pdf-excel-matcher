name: Build App

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]

jobs:
  changes:
    name: Detect relevant changes
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || !github.event.pull_request.draft
    permissions:
      pull-requests: read
      contents: read
    outputs:
      app: ${{ steps.filter.outputs.app }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Filter paths
        id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            app:
              - 'pdf_excel_annotator/**'
              - 'gui.py'
              - 'main.py'
              - 'pyproject.toml'
              - 'requirements.txt'
              - 'pdf-excel-annotator.spec'
              - '.github/workflows/build.yml'

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.app == 'true' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: requirements.txt
      - run: python -m pip install --upgrade pip wheel setuptools
      - run: pip install -r requirements.txt pytest
      - run: pytest tests/ -v

  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: [changes, test]
    if: needs.changes.outputs.app == 'true' || github.event_name == 'workflow_dispatch'
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Upgrade pip
        run: python -m pip install --upgrade pip wheel setuptools

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Show environment
        run: |
          python --version
          pip --version
          python -c "import PySide6, fitz, openpyxl; print('PySide6', PySide6.__version__); print('PyMuPDF', fitz.__doc__.split()[1]); print('openpyxl', openpyxl.__version__)"

      - name: Build with PyInstaller
        run: pyinstaller pdf-excel-annotator.spec

      - name: Package artifact (Linux)
        if: runner.os == 'Linux'
        run: tar -czf pdf-excel-annotator-linux.tar.gz -C dist pdf-excel-annotator

      - name: Package artifact (macOS)
        if: runner.os == 'macOS'
        run: ditto -c -k --sequesterRsrc --keepParent dist/pdf-excel-annotator.app pdf-excel-annotator-macos.zip

      - name: Package artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path "dist/pdf-excel-annotator/*" -DestinationPath "pdf-excel-annotator-windows.zip"

      - name: Upload artifact (Linux)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: pdf-excel-annotator-linux
          path: pdf-excel-annotator-linux.tar.gz
          if-no-files-found: error

      - name: Upload artifact (macOS)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: pdf-excel-annotator-macos
          path: pdf-excel-annotator-macos.zip
          if-no-files-found: error

      - name: Upload artifact (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: pdf-excel-annotator-windows
          path: pdf-excel-annotator-windows.zip
          if-no-files-found: error
