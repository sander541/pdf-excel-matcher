name: Create Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g., 0.2.0)'
        required: true
        type: string
      release_notes:
        description: 'Release notes/changelog'
        required: false
        type: string

jobs:
  create-release:
    runs-on: ubuntu-latest
    name: Create and Tag Release

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate version format
        run: |
          if ! [[ "${{ inputs.version }}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "❌ Invalid version format. Use semantic versioning (e.g., 0.2.0)"
            exit 1
          fi
          echo "✅ Version format valid: ${{ inputs.version }}"

      - name: Update version in version.py
        run: |
          sed -i 's/__version__ = ".*"/__version__ = "${{ inputs.version }}"/' pdf_excel_annotator/version.py
          cat pdf_excel_annotator/version.py

      - name: Update version in pyproject.toml
        run: |
          sed -i 's/version = ".*"/version = "${{ inputs.version }}"/' pyproject.toml
          cat pyproject.toml

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit version changes
        run: |
          git add pdf_excel_annotator/version.py pyproject.toml
          git commit -m "chore: bump version to ${{ inputs.version }}"

      - name: Create and push tag
        run: |
          git tag -a v${{ inputs.version }} -m "Release v${{ inputs.version }}"
          git push origin main
          git push origin v${{ inputs.version }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ inputs.version }}
          body: ${{ inputs.release_notes || 'Release v' + inputs.version }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Release Summary
        run: |
          echo "✅ Release created successfully!"
          echo ""
          echo "📝 Version: v${{ inputs.version }}"
          echo "🏷️  Tag: v${{ inputs.version }}"
          echo "📦 Files will be built automatically by the 'Build and Release' workflow"
          echo ""
          echo "Users will be notified of the update on next app launch!"
