name: Release
run-name: Release v${{ inputs.version }}

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g., 1.1.0)'
        required: true
        type: string
      release_notes:
        description: 'Release notes / changelog'
        required: false
        type: string

jobs:
  # ── Step 1: run tests ─────────────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: requirements.txt
      - run: python -m pip install --upgrade pip wheel setuptools
      - run: pip install -r requirements.txt pytest
      - run: pytest tests/ -v

  # ── Step 2: bump version, tag, create GitHub Release ─────────────────────
  prepare:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate version format
        run: |
          if ! [[ "${{ inputs.version }}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "❌ Invalid version format. Use semantic versioning (e.g., 1.1.0)"
            exit 1
          fi
          echo "✅ Version: ${{ inputs.version }}"

      - name: Bump version files
        run: |
          sed -i 's/__version__ = ".*"/__version__ = "${{ inputs.version }}"/' pdf_excel_annotator/version.py
          sed -i 's/^version = ".*"/version = "${{ inputs.version }}"/' pyproject.toml

      - name: Commit, tag and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pdf_excel_annotator/version.py pyproject.toml
          git commit -m "chore: bump version to ${{ inputs.version }}"
          git tag -a v${{ inputs.version }} -m "Release v${{ inputs.version }}"
          git push origin HEAD:${{ github.event.repository.default_branch }}
          git push origin v${{ inputs.version }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          body: ${{ inputs.release_notes || format('Release v{0}', inputs.version) }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Step 3: build on all platforms in parallel (waits for prepare) ────────
  build:
    needs: prepare
    permissions:
      contents: write
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            name: Windows
            artifact: dist/installer/pdf-excel-annotator-setup.exe
          - os: macos-latest
            name: macOS
            artifact: pdf-excel-annotator-macos.zip
          - os: ubuntu-latest
            name: Linux
            artifact: pdf-excel-annotator-linux.tar.gz

    steps:
      - name: Checkout tag
        uses: actions/checkout@v4
        with:
          ref: v${{ inputs.version }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Upgrade pip
        run: python -m pip install --upgrade pip wheel setuptools

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Build with PyInstaller
        run: pyinstaller pdf-excel-annotator.spec

      - name: Install Inno Setup (Windows)
        if: runner.os == 'Windows'
        run: choco install innosetup --no-progress -y

      - name: Build installer (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: iscc "/DVersion=${{ inputs.version }}" pdf-excel-annotator.iss

      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: ditto -c -k --sequesterRsrc --keepParent dist/pdf-excel-annotator.app pdf-excel-annotator-macos.zip

      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: tar -czf pdf-excel-annotator-linux.tar.gz -C dist pdf-excel-annotator

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          files: ${{ matrix.artifact }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
