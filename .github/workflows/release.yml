name: Build and Release

on:
  push:
    tags:
      - 'v*'  # Trigger on version tags like v0.1.0, v0.2.0, etc.

jobs:
  build:
    runs-on: ${{ matrix.os }}
    name: Build ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: Linux
            artifact: pdf-excel-annotator-linux.tar.gz
            build_cmd: tar -czf pdf-excel-annotator-linux.tar.gz -C dist pdf-excel-annotator
          - os: macos-latest
            name: macOS
            artifact: pdf-excel-annotator-macos.zip
            build_cmd: ditto -c -k --sequesterRsrc --keepParent dist/pdf-excel-annotator.app pdf-excel-annotator-macos.zip
          - os: windows-latest
            name: Windows
            artifact: pdf-excel-annotator.exe
            build_cmd: echo "No additional packaging needed for Windows"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        run: |
          pyinstaller pdf-excel-annotator.spec

      - name: Package artifact (Linux)
        if: runner.os == 'Linux'
        run: |
          tar -czf pdf-excel-annotator-linux.tar.gz -C dist pdf-excel-annotator

      - name: Package artifact (macOS)
        if: runner.os == 'macOS'
        run: |
          ditto -c -k --sequesterRsrc --keepParent dist/pdf-excel-annotator.app pdf-excel-annotator-macos.zip

      - name: Upload to Release
        uses: softprops/action-gh-release@v1
        with:
          files: ${{ matrix.artifact }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release-summary:
    runs-on: ubuntu-latest
    needs: build
    name: Release Summary
    steps:
      - name: Release Complete
        run: |
          echo "✅ Release created successfully!"
          echo "Version: ${{ github.ref }}"
          echo "📦 Artifacts:"
          echo "  - pdf-excel-annotator-linux.tar.gz"
          echo "  - pdf-excel-annotator-macos.zip"
          echo "  - pdf-excel-annotator.exe"
          echo ""
          echo "Users will be notified of the update on next app launch!"
